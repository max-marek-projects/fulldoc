name: Lint and build python library

on:
  push:
    branches:
      - "**"

jobs:

  parse-versions:
    runs-on: ubuntu-latest
    outputs:
      library-version: ${{ steps.run.outputs.library-version }}
      python-versions: ${{ steps.run.outputs.python-versions }}
      build-enabled: ${{ steps.run.outputs.build-enabled }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # only for parsing pyproject.toml
      - name: Run version parser
        id: run
        run: python .github/scripts/parse_versions.py
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

  lint:
    needs: parse-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.parse-versions.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: make req-dev

      - name: Run linters
        run: make lint

  build:
    needs: [ "parse-versions", "lint" ]
    if: needs.parse-versions.outputs.build-enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.parse-versions.outputs.python-versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Build package
        run: uv build --no-sources

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: library-dist-${{ needs.parse-versions.outputs.library-version }}-py${{
            matrix.python-version }}
          path: dist/
