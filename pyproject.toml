[project]
name = 'readme-generator'
version = '0.0.0'
authors = [
    {name = 'Maksim Ermoshin', email = 'maksim_ermoshin@mail.ru'},
]
description = 'Library for automatic readme generation and docstrings check'
readme = 'README.md'
requires-python = '>=3.10'
dependencies = [
    'importlib_metadata',
    'pandas',
    'setuptools',
    'requests',
    'tabulate',
    'asttokens',
    'typing-extensions',
    'python-dotenv',
    'flake8',
    'flake8-docstrings',
]
[project.optional-dependencies]
style = [
    'black==25.1.0',
    'flake8==7.2.0',
    'flake8-commas==4.0.0',
    'flake8-docstrings==1.7.0',
    'flake8-print==5.0.0',
    'flake8-pyproject==1.2.3',
    'flake8-quotes==3.4.0',
    'isort==6.0.1',
    'mypy==1.16.1',
    'pandas-stubs==2.0.1.230501',
    'types-requests==2.32.4.20250611',
    'types-setuptools==80.9.0.20250529',
]

[project.scripts]
generate-readme = 'readme_generator.scripts.generate:generate_readme'

[build-system]
requires = ['setuptools']
build-backend = 'setuptools.build_meta'

[tool.setuptools.package-data]
'readme_generator' = ['py.typed']

[tool.isort]
profile = 'black'
line_length = 120

[tool.black]
line-length = 120
skip-string-normalization = true

[tool.flake8]
ignore = []
exclude = ['venv/', 'env/', 'temp/']
max-line-length = 120

[tool.mypy]
python_version = '3.10'
exclude = ['venv', 'temp']
explicit_package_bases = true
disallow_untyped_defs = true
