[project]
name = 'docstrings-parser'
version = '0.0.2.a2'
authors = [
    {name = 'Maksim Ermoshin', email = 'maksim_ermoshin@mail.ru'},
]
description = 'Library for automatic docstrings check and readme generation'
readme = 'README.md'
requires-python = '>=3.14'
dependencies = [
    'importlib_metadata',
    'pandas',
    'setuptools',
    'requests',
    'tabulate',
    'asttokens',
    'typing-extensions',
    'python-dotenv',
    'flake8',
    'flake8-docstrings',
]
[project.optional-dependencies]
style = [
    'black',
    'flake8',
    'flake8-commas',
    'flake8-docstrings',
    'flake8-print',
    'flake8-pyproject',
    'flake8-quotes',
    'isort',
    'mypy',
    'pandas-stubs',
    'types-setuptools',
]

[project.scripts]
generate-readme = 'readme_generator.scripts.generate:generate_readme'

[build-system]
requires = ['setuptools']
build-backend = 'setuptools.build_meta'

[tool.setuptools.package-data]
'readme_generator' = ['py.typed']

[tool.isort]
profile = 'black'
line_length = 120

[tool.black]
line-length = 120
skip-string-normalization = true

[tool.flake8]
ignore = ['W503']
exclude = ['venv/', 'env/', 'temp/', 'build/']
max-line-length = 120

[tool.mypy]
python_version = '3.10'
exclude = ['venv', 'temp']
explicit_package_bases = true
disallow_untyped_defs = true
